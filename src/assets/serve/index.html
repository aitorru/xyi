<!DOCTYPE html>
<html lang="en">
  <head>
    <title>xyi // serve</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --bg: #050505;
        --panel: #0b0b0b;
        --line: #f5f5f5;
        --muted: #7f7f7f;
        --positive: #5ee06c;
        --warning: #ffd24a;
        --critical: #ff5d5d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--line);
        font-family: "JetBrains Mono", "SFMono-Regular", ui-monospace, monospace;
        padding: 20px;
      }
      .screen {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .panel {
        border: 1px dashed rgba(245, 245, 245, 0.7);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.01)
        );
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .panel h1,
      .panel h2,
      .panel p {
        margin: 0;
      }
      .eyebrow {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }
      .header-row {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }
      h1 {
        font-size: 28px;
        letter-spacing: 0.04em;
      }
      .path {
        color: var(--muted);
        font-size: 13px;
        word-break: break-all;
      }
      .path span {
        color: var(--line);
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--warning);
        box-shadow: 0 0 8px currentColor;
      }
      .dot.online {
        background: var(--positive);
      }
      .btn {
        border: 1px solid rgba(245, 245, 245, 0.75);
        background: transparent;
        color: var(--line);
        font-family: inherit;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        padding: 9px 16px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.15s ease-in-out;
      }
      .btn:hover {
        background: var(--line);
        color: var(--bg);
      }
      .list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
      }
      .list li {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 4px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        cursor: pointer;
        transition: background 0.12s ease-in-out;
      }
      .list li:first-child {
        border-top: none;
      }
      .list li:hover {
        background: rgba(255, 255, 255, 0.04);
      }
      .list a {
        color: var(--line);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }
      .glyph {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        min-width: 38px;
      }
      .folder .glyph {
        color: var(--warning);
      }
      .file .glyph {
        color: var(--positive);
      }
    </style>
    <script type="module">
      import { h, render } from "/preact.mjs";
      import htm from "/htm.mjs";

      // Initialize htm with Preact
      const html = htm.bind(h);

      let socket_connected = false;
      let local_data = {
        current_dir: "",
        folders: [],
        files: [],
      };
      // Render the UI for the first time
      render(
        html`<${App} data="${local_data}" status="${socket_connected}" />`,
        document.body
      );
      // Connect to websocket
      let url = new URL("/state", window.location.href);
      // http => ws
      // https => wss
      url.protocol = url.protocol.replace("http", "ws");
      let ws = new WebSocket(url.href);

      url = new URL("/update_state", window.location.href);
      // http => ws
      // https => wss
      url.protocol = url.protocol.replace("http", "ws");
      let ws_updator = new WebSocket(url.href);

      function App(props) {
        return html`<main class="screen">
          <section class="panel">
            <div class="header-row">
              <div>
                <div class="eyebrow">xyi / serve</div>
                <h1>File Server</h1>
              </div>
              <div class="toolbar">
                <span class="status">
                  <span class="dot ${props.status ? "online" : ""}"></span>
                  ${props.status ? "connected" : "reconnecting"}
                </span>
                <a class="btn" href=${new URL("/download_zip", window.location.href)}>
                  ⤓ Download all (.zip)
                </a>
              </div>
            </div>
            <p class="path">serving · <span>${props.data.current_dir}</span></p>
          </section>

          <section class="panel">
            <div class="eyebrow">Directory listing</div>
            <ul class="list">
              <li
                class="folder"
                onclick=${() =>
                  ws_updator.send(
                    JSON.stringify({ message_type: "up_dir", message: "" })
                  )}
              >
                <span class="glyph">dir</span>
                ..
              </li>
              ${props.data.folders.map(
                (folder) =>
                  html`<li
                    class="folder"
                    onclick=${() => {
                      ws_updator.send(
                        JSON.stringify({
                          message_type: "change_dir",
                          message: folder.path,
                        })
                      );
                    }}
                  >
                    <span class="glyph">dir</span>
                    ${folder.name}
                  </li>`
              )}
              ${props.data.files.map(
                (file) =>
                  html`<li class="file">
                    <a
                      target="_blank"
                      href=${new URL(
                        "/download?path=" + btoa(file.path),
                        window.location.href
                      )}
                    >
                      <span class="glyph">file</span>
                      ${file.name}
                    </a>
                  </li>`
              )}
            </ul>
          </section>
        </main>`;
      }

      ws.onmessage = (ev) => {
        local_data = JSON.parse(ev.data);
        // Append the blob incoming to the array
        render(
          html`<${App} data="${local_data}" status="${socket_connected}" />`,
          document.body
        );
      };
      ws.onopen = (ev) => {
        socket_connected = true;
      };
      ws.onclose = (ev) => {
        socket_connected = false;
        setTimeout(() => {
          let url_r = new URL("/state", window.location.href);
          // http => ws
          // https => wss
          url_r.protocol = url_r.protocol.replace("http", "ws");
          ws = new WebSocket(url_r.href);
        }, 2000);
        render(
          html`<${App} data="${local_data}" status="${socket_connected}" />`,
          document.body
        );
      };
      ws.onerror = (ev) => {
        socket_connected = false;
        setTimeout(() => {
          let url_r = new URL("/state", window.location.href);
          // http => ws
          // https => wss
          url_r.protocol = url_r.protocol.replace("http", "ws");
          ws = new WebSocket(url_r.href);
        }, 2000);
        render(
          html`<${App} data="${local_data}" status="${socket_connected}" />`,
          document.body
        );
      };
      ws_updator.onclose = (ev) => {
        setTimeout(() => {
          let url_r = new URL("/update_state", window.location.href);
          // http => ws
          // https => wss
          url_r.protocol = url_r.protocol.replace("http", "ws");
          ws_updator = new WebSocket(url_r.href);
        }, 2000);
      };
      ws_updator.onerror = (ev) => {
        setTimeout(() => {
          let url_r = new URL("/update_state", window.location.href);
          // http => ws
          // https => wss
          url_r.protocol = url.protocol.replace("http", "ws");
          ws_updator = new WebSocket(url_r.href);
        }, 2000);
      };
      window.onbeforeunload = function () {
        ws.onclose = function () {}; // disable onclose handler first
        ws.close();
        ws_updator.onclose = function () {}; // disable onclose handler first
        ws_updator.close();
      };
    </script>
  </head>

  <body></body>
</html>
